<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAC 3.0 DP Generator | MSSN FUTMINNA</title>
  <style>
    /* modern, fluid design parameters */
    :root {
      --brand-green-dark: #114b20;
      --brand-green-med: #1a6b2e;
      --brand-green-pale: #e8f5ee;
      --glass-base: rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 10px 30px -5px rgba(26, 107, 46, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
      --text-main: #1f2937;
      --text-muted: #6b7280;
    }

    /* modern, scalable font stack */
    @font-face {
      font-family: 'Geist';
      src: url('https://assets.codepen.io/605876/GeistVF.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      color: var(--text-main);
    }

    .glass-card {
      background: var(--glass-base);
      backdrop-filter: blur(25px) saturate(210%);
      -webkit-backdrop-filter: blur(25px) saturate(210%);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      box-shadow: var(--glass-shadow);
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 540px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2rem;
    }
    
    .header-icon {
      width: 52px;
      height: 52px;
      background: var(--brand-green-pale);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(26, 107, 46, 0.2);
    }
    
    .header-icon svg { width: 28px; height: 28px; fill: var(--brand-green-med); }
    
    .header-text h1 {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.01em;
    }
    
    .header-text p {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      background: var(--brand-green-med);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: 100px;
      padding: 3px 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Input & Download Layout */
    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      height: 50px;
      padding: 0 16px;
      font-size: 1rem;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      outline: none;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.6);
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--brand-green-med);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(26, 107, 46, 0.1);
    }

    input[type="text"]::placeholder { color: #9ca3af; }

    .btn-download {
      height: 50px;
      padding: 0 24px;
      background: var(--brand-green-med);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-download:hover { background: var(--brand-green-dark); }
    .btn-download:active { transform: scale(0.98); }
    .btn-download svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* Canvas preview area */
    .preview-container {
      margin-top: 2rem;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .preview-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .preview-wrap {
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      background: #e8ede8;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    /* dynamic character counter mirroring the overall progress feeling */
    .char-counter {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    
    .char-counter strong { color: var(--brand-green-med); font-weight: 600; }

    /* Footer note */
    .note {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 1.5rem;
    }
    .note strong { color: var(--brand-green-med); font-weight: 600; }

    /* Breakpoint Handling for device adaptive */
    @media (max-width: 480px) {
      .glass-card { padding: 1.75rem 1.25rem; border-radius: 24px; }
      .header { margin-bottom: 1.5rem; }
      .input-group { flex-direction: column; gap: 10px; }
      input[type="text"] { width: 100%; }
      .btn-download { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="glass-card">
  
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div class="header-text">
      <h1>MAC 3.0 DP Engine <span class="badge">MSSN FUTMINNA</span></h1>
      <p>Muslim Academic Conference · Saturday, June 13, 2026</p>
    </div>
  </div>

  <div class="form-group">
    <label for="nameInput">Enter Full Name (Max 35 Characters)</label>
    <div class="input-group">
      <input
        type="text"
        id="nameInput"
        placeholder="Sulyman Muhammad Sodiq"
        maxlength="35"
        autocomplete="off"
        oninput="updateUI()"
      />
      <button class="btn-download" onclick="downloadDP()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
    </div>
  </div>

  <div class="preview-container">
    <div class="preview-header">
      <p class="preview-label">Live Preview</p>
      <p class="char-counter"><strong id="charCount">22</strong> / 35 characters</p>
    </div>
    <div class="preview-wrap">
      <canvas id="dpCanvas" width="1080" height="1080"></canvas>
    </div>
  </div>

  <p class="note">
    Generated image renders as a crisp, optimized <strong>1080 × 1080 PNG</strong> copy.
  </p>

</div>

<script>
  const canvas = document.getElementById('dpCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  // Calibrated positions for the official_flyer.jpg asset configuration
  const BAND_TOP    = 210;
  const BAND_BOTTOM = 430;
  const BAND_MID    = Math.round((BAND_TOP + BAND_BOTTOM) / 2);
  const BAND_H      = BAND_BOTTOM - BAND_TOP;

  const flyer = new Image();
  flyer.crossOrigin = "anonymous"; 

  flyer.onload = () => {
    renderDP();
  };
  
  flyer.onerror = () => {
    ctx.fillStyle = '#1a6b2e';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('File official_flyer.jpg not found.', W / 2, H / 2);
  };

  // Re-referencing the explicit name structure configuration
  flyer.src = 'official_flyer.jpg';

  function fitFont(text, maxW, maxH) {
    // 0.42 is the dynamic scale factor optimized for the banner geometry
    let size = Math.floor(maxH * 0.42); 
    ctx.font = `700 ${size}px "Segoe UI", Arial, sans-serif`;
    while (ctx.measureText(text).width > maxW && size > 24) {
      size -= 2;
      ctx.font = `700 ${size}px "Segoe UI", Arial, sans-serif`;
    }
    return size;
  }

  function updateUI() {
    renderDP();
    const input = document.getElementById('nameInput');
    document.getElementById('charCount').innerText = input.value.length || 22;
  }

  function renderDP() {
    const raw  = document.getElementById('nameInput').value.trim();
    const name = raw || 'Sulyman Muhammad Sodiq'; 

    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(flyer, 0, 0, W, H);

    const maxW = W * 0.86; 
    fitFont(name, maxW, BAND_H);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowColor   = 'rgba(0,0,0,0.12)';
    ctx.shadowBlur    = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 2;

    ctx.fillStyle = '#ffffff';
    
    // Fine-tuned Typography Baseline Balancing + 4
    ctx.fillText(name, W / 2, BAND_MID + 4);

    // Context Clean-down Pipeline
    ctx.shadowColor   = 'transparent';
    ctx.shadowBlur    = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
  }

  function downloadDP() {
    const raw  = document.getElementById('nameInput').value.trim() || 'Sulyman_Muhammad_Sodiq';
    renderDP();
    const link    = document.createElement('a');
    link.download = 'MAC3_DP_' + raw.replace(/\s+/g, '_') + '.png';
    link.href     = canvas.toDataURL('image/png');
    link.click();
  }

  window.onload = () => {
    updateUI();
  };
</script>

</body>
</html>
