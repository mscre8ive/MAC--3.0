<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAC 3.0 — DP Generator | MSSN FUTMINNA</title>
  <style>
    :root {
      --brand-green-dark: #114b20;
      --brand-green: #1a6b2e;
      --brand-green-light: #e8f5ee;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --bg-gradient: linear-gradient(135deg, #f4f7f4 0%, #e6eee6 100%);
      --card-shadow: 0 10px 30px -5px rgba(26, 107, 46, 0.08), 0 4px 12px -2px rgba(0, 0, 0, 0.04);
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      padding: 2rem 1.75rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    /* Header Styling */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .header-icon {
      width: 48px;
      height: 48px;
      background: var(--brand-green);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(26, 107, 46, 0.2);
    }
    
    .header-icon svg { 
      width: 24px; 
      height: 24px; 
      fill: none; 
      stroke: #fff; 
      stroke-width: 2; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    
    .header-text h1 {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .header-text p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--brand-green-light);
      color: var(--brand-green);
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Input & Interactive Layout Block */
    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      height: 48px;
      padding: 0 16px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      outline: none;
      color: var(--text-dark);
      background: #f9fafb;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: var(--brand-green);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(26, 107, 46, 0.12);
    }

    input[type="text"]::placeholder { 
      color: #9ca3af; 
    }

    .btn-download {
      height: 48px;
      padding: 0 24px;
      background: var(--brand-green);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(26, 107, 46, 0.15);
    }

    .btn-download:hover { 
      background: var(--brand-green-dark);
      box-shadow: 0 6px 16px rgba(26, 107, 46, 0.25);
    }
    
    .btn-download:active { 
      transform: scale(0.98); 
    }
    
    .btn-download svg { 
      width: 20px; 
      height: 20px; 
      stroke: currentColor; 
      fill: none; 
      stroke-width: 2.2; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }

    /* Preview Canvas Area */
    .preview-container {
      margin-top: 1.75rem;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .preview-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .preview-wrap {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      position: relative;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .note {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 1.25rem;
    }
    
    .note strong { 
      color: var(--brand-green); 
      font-weight: 600;
    }

    /* Mobile Adaptive Breakpoint Handling */
    @media (max-width: 480px) {
      .card { 
        padding: 1.5rem 1.25rem; 
        border-radius: 20px;
      }
      .input-group { 
        flex-direction: column; 
        gap: 10px;
      }
      input[type="text"] { 
        width: 100%; 
      }
      .btn-download { 
        width: 100%; 
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="header-text">
        <h1>MAC 3.0 DP Engine <span class="badge">FUTMINNA</span></h1>
        <p>Muslim Academic Conference · June 13, 2026</p>
      </div>
    </div>

    <div class="form-group">
      <label for="nameInput">Enter Full Name</label>
      <div class="input-group">
        <input
          type="text"
          id="nameInput"
          placeholder="Sulyman Muhammad Sodiq"
          maxlength="35"
          autocomplete="off"
          oninput="renderDP()"
        />
        <button class="btn-download" onclick="downloadDP()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
    </div>

    <div class="preview-container">
      <div class="preview-header">
        <p class="preview-label">Live Preview</p>
        <span class="badge" style="background: #f3f4f6; color: #6b7280;">1080 × 1080 px</span>
      </div>
      <div class="preview-wrap">
        <canvas id="dpCanvas" width="1080" height="1080"></canvas>
      </div>
    </div>

    <p class="note">
      Generates high-fidelity, crisp <strong>PNG</strong> copies tailored natively for social grids.
    </p>

  </div>
</div>

<script>
  const canvas = document.getElementById('dpCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  // Calibrated layout coordinates targeting center line of green polygon banner
  const BAND_TOP    = 210;
  const BAND_BOTTOM = 430;
  const BAND_MID    = Math.round((BAND_TOP + BAND_BOTTOM) / 2);
  const BAND_H      = BAND_BOTTOM - BAND_TOP;

  const flyer = new Image();
  flyer.crossOrigin = "anonymous"; 

  flyer.onload = () => {
    renderDP();
  };
  
  flyer.onerror = () => {
    ctx.fillStyle = '#1a6b2e';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Background layout configuration mismatch.', W / 2, H / 2);
  };

  /* Verify this file parameter perfectly references your target asset file 
    structure configuration (e.g. 'OFFICIAL FLYER.jpg' or 'OFFICIAL FLYER (1).jpg')
  */
  flyer.src = 'official_flyer.jpg';

  function fitFont(text, maxW, maxH) {
    let size = Math.floor(maxH * 0.42); 
    ctx.font = `700 ${size}px "Segoe UI", -apple-system, Arial, sans-serif`;
    while (ctx.measureText(text).width > maxW && size > 24) {
      size -= 2;
      ctx.font = `700 ${size}px "Segoe UI", -apple-system, Arial, sans-serif`;
    }
    return size;
  }

  function renderDP() {
    const raw  = document.getElementById('nameInput').value.trim();
    const name = raw || 'Sulyman Muhammad Sodiq'; 

    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(flyer, 0, 0, W, H);

    const maxW = W * 0.86; 
    fitFont(name, maxW, BAND_H);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowColor   = 'rgba(0,0,0,0.12)';
    ctx.shadowBlur    = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 2;

    ctx.fillStyle = '#ffffff';
    
    // Renders matching typography baseline offset constraints
    ctx.fillText(name, W / 2, BAND_MID + 4);

    // Context clean-down pipeline
    ctx.shadowColor   = 'transparent';
    ctx.shadowBlur    = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
  }

  function downloadDP() {
    const raw  = document.getElementById('nameInput').value.trim() || 'Sulyman_Muhammad_Sodiq';
    renderDP();
    const link    = document.createElement('a');
    link.download = 'MAC3_DP_' + raw.replace(/\s+/g, '_') + '.png';
    link.href     = canvas.toDataURL('image/png');
    link.click();
  }

  window.onload = () => {
    renderDP();
  };
</script>

</body>
</html>
