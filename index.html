<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAC 3.0 — DP Generator | MSSN FUTMINNA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e5ebe5;
    }
    .header-icon {
      width: 44px;
      height: 44px;
      background: #1a6b2e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 24px; height: 24px; fill: #fff; }
    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    /* Input */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1;
      min-width: 160px;
      height: 44px;
      padding: 0 14px;
      font-size: 15px;
      border: 1.5px solid #d0d8d0;
      border-radius: 10px;
      outline: none;
      color: #111;
      background: #f8faf8;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #1a6b2e;
      background: #fff;
    }
    input[type="text"]::placeholder { color: #aaa; }

    .btn-download {
      height: 44px;
      padding: 0 20px;
      background: #1a6b2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-download:hover { background: #145523; }
    .btn-download:active { transform: scale(0.97); }
    .btn-download svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Canvas preview */
    .preview-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .preview-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0e8e0;
      background: #e8ede8;
      margin-bottom: 1rem;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Footer note */
    .note {
      font-size: 12px;
      color: #999;
      text-align: center;
      line-height: 1.6;
    }
    .note strong { color: #1a6b2e; }

    /* Badge */
    .badge {
      display: inline-block;
      background: #e8f5ee;
      color: #1a6b2e;
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      padding: 3px 8px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem; }
      .input-group { flex-direction: column; }
      .btn-download { width: 100%; justify-content: center; }
      input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="header-text">
      <h1>MAC 3.0 DP Generator <span class="badge">MSSN FUTMINNA</span></h1>
      <p>Muslim Academic Conference · Saturday, 13th June 2026</p>
    </div>
  </div>

  <label for="nameInput">Your Full Name</label>
  <div class="input-group">
    <input
      type="text"
      id="nameInput"
      placeholder="Sulyman Muhammad Sodiq"
      maxlength="40"
      autocomplete="off"
      oninput="renderDP()"
    />
    <button class="btn-download" onclick="downloadDP()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
  </div>

  <p class="preview-label">Preview</p>
  <div class="preview-wrap">
    <canvas id="dpCanvas" width="1080" height="1080"></canvas>
  </div>

  <p class="note">
    Exports as <strong>1080 × 1080 PNG</strong> &mdash; ready for WhatsApp, Instagram, Twitter/X &amp; LinkedIn.
  </p>

</div>

<script>
  const canvas = document.getElementById('dpCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  // Exact positions calibrated for your green flyer block
  const BAND_TOP    = 210;
  const BAND_BOTTOM = 430;
  const BAND_MID    = Math.round((BAND_TOP + BAND_BOTTOM) / 2);
  const BAND_H      = BAND_BOTTOM - BAND_TOP;

  const flyer = new Image();
  flyer.crossOrigin = "anonymous"; 

  flyer.onload = () => {
    renderDP();
  };
  
  flyer.onerror = () => {
    // If the file path completely breaks, check if the file is named "OFFICIAL FLYER (1).jpg" on github
    ctx.fillStyle = '#1a6b2e';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Please make sure your background flyer file name', W / 2, H / 2 - 30);
    ctx.fillText('matches exactly with the script parameters.', W / 2, H / 2 + 20);
  };

  /* 👉 ACTION REQUIRED: Change this string if your file in GitHub has a 
    different name like 'OFFICIAL FLYER (1).jpg' or 'official_flyer.jpg'
  */
  flyer.src = 'official_flyer.jpg';

  function fitFont(text, maxW, maxH) {
    let size = Math.floor(maxH * 0.42); 
    ctx.font = `700 ${size}px "Segoe UI", Arial, sans-serif`;
    while (ctx.measureText(text).width > maxW && size > 24) {
      size -= 2;
      ctx.font = `700 ${size}px "Segoe UI", Arial, sans-serif`;
    }
    return size;
  }

  function renderDP() {
    const raw  = document.getElementById('nameInput').value.trim();
    const name = raw || 'Sulyman Muhammad Sodiq'; 

    ctx.clearRect(0, 0, W, H);
    
    // Draw background image template
    ctx.drawImage(flyer, 0, 0, W, H);

    const maxW = W * 0.86; 
    fitFont(name, maxW, BAND_H);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Add typography drop shadow
    ctx.shadowColor   = 'rgba(0,0,0,0.12)';
    ctx.shadowBlur    = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 2;

    ctx.fillStyle = '#ffffff';
    
    // Render name directly inside the green shape baseline
    ctx.fillText(name, W / 2, BAND_MID + 4);

    // Clean up canvas states
    ctx.shadowColor   = 'transparent';
    ctx.shadowBlur    = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
  }

  function downloadDP() {
    const raw  = document.getElementById('nameInput').value.trim() || 'Sulyman_Muhammad_Sodiq';
    renderDP();
    const link    = document.createElement('a');
    link.download = 'MAC3_DP_' + raw.replace(/\s+/g, '_') + '.png';
    link.href     = canvas.toDataURL('image/png');
    link.click();
  }

  window.onload = () => {
    renderDP();
  };
</script>

</body>
</html>
